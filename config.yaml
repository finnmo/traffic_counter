# config.yaml

# -----------------------------
# Model Configuration
# -----------------------------
model:
  path: "yolo11m.pt"                 # Path to the YOLO model weights file
  detection_threshold: 0.3          # Confidence threshold for object detections (0.0 - 1.0)
  tracking_threshold: 0.8            # IoU threshold for tracking (0.0 - 1.0)
  tracker: "botsort.yaml"            # Tracker configuration file ("bytetrack.yaml" or "botsort.yaml")

# -----------------------------
# Path and Crossing Configuration
# -----------------------------
path:
  max_length: 20                     # Maximum number of points to keep in each object's tracking path
  min_points_for_crossing: 2         # Minimum number of points required to validate a path for crossing detection

# -----------------------------
# Frame Processing Configuration
# -----------------------------
frame_processing:
  frame_skip: 7                      # Process every Nth frame to improve processing speed
  roi_padding: 100                   # Padding in pixels around the counting line to define the Region of Interest (ROI)

# -----------------------------
# Class Mapping Configuration
# -----------------------------
classes:
  mapping:
    0: "person"                      # YOLO class ID 0 mapped to "person"
    2: "car"                         # YOLO class ID 2 mapped to "car"
    #7: "truck"                       # YOLO class ID 7 mapped to "truck"

# -----------------------------
# Time Configuration
# -----------------------------
time:
  start_time: "08:00"  # Optional. Format: "HH:MM" (24-hour format). Defaults to "00:00" if not specified.

# -----------------------------
# Output Configuration
# -----------------------------
output:
  save_csv: false                     # Whether to save the crossing events to a CSV file
  csv_path: "crossings.csv"          # Path to save the CSV file with crossing events
  save_video: false                   # Whether to save the output video with annotations
  video_path: "output.mp4"           # Path to save the annotated output video

# -----------------------------
# Logging Configuration
# -----------------------------
logging:
  level: "INFO"                       # Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "traffic_counter.log"         # Path to save the log file
